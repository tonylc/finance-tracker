<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance Tracker — Tests</title>
<style>
  body { font-family: -apple-system, sans-serif; font-size: 13px; margin: 0; background: #f5f5f5; }
  header { background: #1a1a2e; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 16px; font-weight: 700; }
  #summary { padding: 10px 24px; background: #fff; border-bottom: 1px solid #ddd; font-size: 13px; }
  #summary .pass { color: #2e7d32; font-weight: 700; }
  #summary .fail { color: #b71c1c; font-weight: 700; }
  main { max-width: 860px; margin: 20px auto; padding: 0 16px; }
  .suite { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .suite-header { background: #1a1a2e; color: #fff; padding: 10px 16px; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; }
  .suite-header .badge { font-size: 11px; background: rgba(255,255,255,.15); border-radius: 10px; padding: 2px 10px; }
  .test { padding: 8px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; gap: 10px; }
  .test:last-child { border-bottom: none; }
  .icon { font-size: 14px; line-height: 1.4; flex-shrink: 0; }
  .test-name { flex: 1; }
  .test-err { font-size: 11px; color: #b71c1c; margin-top: 3px; font-family: 'Courier New', monospace; white-space: pre-wrap; }
  .pass-bg { background: #f9fff9; }
  .fail-bg { background: #fff5f5; }
  .test { cursor: pointer; }
  .test:hover { filter: brightness(0.97); }
  .test-toggle { flex-shrink: 0; color: #999; font-size: 11px; line-height: 1.4; user-select: none; }
  .test-source { display: none; margin-top: 6px; font-size: 11px; font-family: 'Courier New', monospace; background: #1a1a2e; color: #e8e8e8; padding: 8px 12px; border-radius: 4px; white-space: pre; overflow-x: auto; }
  .test.expanded .test-source { display: block; }
</style>
</head>
<body>

<header>
  <h1>Finance Tracker — Unit Tests</h1>
  <span id="header-status" style="font-size:13px;"></span>
</header>
<div id="summary">Loading tests…</div>
<main id="main"></main>

<!-- Load the app in an iframe just to grab the exported lib -->
<iframe id="app-frame" src="index.html" style="display:none;" onload="runTests()"></iframe>

<script>
// ── Test runner ─────────────────────────────────────────────────────────────
const results = [];
let currentSuite = null;

function suite(name, fn) {
  currentSuite = { name, tests: [] };
  results.push(currentSuite);
  fn();
}

function test(name, fn) {
  const src = fn.toString();
  try {
    fn();
    currentSuite.tests.push({ name, pass: true, src });
  } catch (e) {
    currentSuite.tests.push({ name, pass: false, err: e.message, src });
  }
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg || 'Assertion failed');
}

function assertEqual(a, b) {
  const as = JSON.stringify(a), bs = JSON.stringify(b);
  if (as !== bs) throw new Error(`Expected ${bs}\n  Got     ${as}`);
}

// ── Tests ───────────────────────────────────────────────────────────────────
function runTests() {
  const lib = document.getElementById('app-frame').contentWindow.__financeLib;
  if (!lib) {
    document.getElementById('summary').textContent = 'ERROR: Could not load app lib. Make sure index.html is served from the same directory.';
    return;
  }
  const {
    parseCSV, formatAccountKey, validateImport, buildHeaderMap,
    parseTransaction, deduplicateTransactions, filterByMonth,
    aggregateByCategory, totalSpend, cycleCategoryByKey,
    validateExport, toCSV, getMonthList, sortByDateDesc, sortByDateAsc, filterBySearch,
    exportAccountsJSON, importAccountsJSON, ALL_SUBS, VALID_CATS,
  } = lib;

  // ── parseCSV ──────────────────────────────────────────────────────────────
  suite('parseCSV', () => {
    test('returns empty array for blank input', () => {
      assertEqual(parseCSV(''), []);
      assertEqual(parseCSV('   '), []);
      assertEqual(parseCSV(null), []);
    });

    test('parses simple CSV', () => {
      const rows = parseCSV('a,b,c\n1,2,3');
      assertEqual(rows.length, 2);
      assertEqual(rows[0], ['a', 'b', 'c']);
      assertEqual(rows[1], ['1', '2', '3']);
    });

    test('handles quoted fields with embedded commas', () => {
      const rows = parseCSV('"hello, world",foo,bar');
      assertEqual(rows[0][0], 'hello, world');
      assertEqual(rows[0][1], 'foo');
    });

    test('handles Windows CRLF line endings', () => {
      const rows = parseCSV('a,b\r\n1,2\r\n3,4');
      assertEqual(rows.length, 3);
    });

    test('strips BOM', () => {
      const rows = parseCSV('\uFEFFDate,Desc\n2025-01-01,Foo');
      assertEqual(rows[0][0], 'Date');
    });

    test('handles escaped quotes inside quoted fields', () => {
      const rows = parseCSV('"say ""hello""",world');
      assertEqual(rows[0][0], 'say "hello"');
    });

    test('skips blank lines', () => {
      const rows = parseCSV('a,b\n\n1,2\n\n');
      assertEqual(rows.length, 2);
    });
  });

  // ── formatAccountKey ──────────────────────────────────────────────────────
  suite('formatAccountKey', () => {
    test('basic format', () => {
      assertEqual(formatAccountKey('Chase', '7515'), 'Chase *7515');
    });

    test('account with parentheses', () => {
      assertEqual(formatAccountKey('Citi (tony)', '1003'), 'Citi (tony) *1003');
    });

    test('trims whitespace', () => {
      assertEqual(formatAccountKey('  BofA  ', '  1884  '), 'BofA *1884');
    });
  });

  // ── buildHeaderMap ────────────────────────────────────────────────────────
  suite('buildHeaderMap', () => {
    test('maps standard headers case-insensitively', () => {
      const m = buildHeaderMap(['Date', 'Description', 'Amount', 'Category', 'Fix']);
      assertEqual(m.date, 0);
      assertEqual(m.description, 1);
      assertEqual(m.amount, 2);
      assertEqual(m.category, 3);
      assertEqual(m.fix, 4);
    });

    test('returns error if required column missing', () => {
      const m = buildHeaderMap(['Date', 'Amount']); // missing Description
      assert(m.error, 'should return error');
      assert(m.error.includes('Description'), 'error mentions missing column');
    });

    test('category and fix default to -1 when absent', () => {
      const m = buildHeaderMap(['Date', 'Description', 'Amount']);
      assertEqual(m.category, -1);
      assertEqual(m.fix, -1);
    });
  });

  // ── validateImport ────────────────────────────────────────────────────────
  suite('validateImport', () => {
    const hdr = buildHeaderMap(['Date', 'Description', 'Amount', 'Category', 'Fix']);

    test('passes when all categories are valid', () => {
      const rows = [['2025-01-01', 'Test', '-10', 'Groceries', 'false']];
      const r = validateImport(rows, hdr);
      assert(r.valid);
      assertEqual(r.errors.length, 0);
    });

    test('passes when category is empty', () => {
      const rows = [['2025-01-01', 'Test', '-10', '', 'false']];
      const r = validateImport(rows, hdr);
      assert(r.valid);
    });

    test('fails with row number when category is invalid', () => {
      const rows = [
        ['2025-01-01', 'Test', '-10', 'InvalidCat', 'false'],
        ['2025-01-02', 'Test2', '-5', 'Groceries', 'false'],
        ['2025-01-03', 'Test3', '-8', 'BadCategory', 'false'],
      ];
      const r = validateImport(rows, hdr);
      assert(!r.valid);
      assertEqual(r.errors.length, 2);
      assert(r.errors[0].includes('Row 2'), 'mentions row 2');
      assert(r.errors[1].includes('Row 4'), 'mentions row 4');
    });

    test('error message includes the bad category value', () => {
      const rows = [['2025-01-01', 'Test', '-10', 'NOPE', 'false']];
      const r = validateImport(rows, hdr);
      assert(r.errors[0].includes('NOPE'));
    });
  });

  // ── parseTransaction ──────────────────────────────────────────────────────
  suite('parseTransaction', () => {
    const hdr = buildHeaderMap(['Date', 'Description', 'Amount', 'Category', 'Fix']);

    test('maps fields correctly', () => {
      const t = parseTransaction(['2025-03-15', 'Starbucks', '-4.75', 'Coffee / Bakery', 'false'], hdr, 'Chase *7515');
      assertEqual(t.date, '2025-03-15');
      assertEqual(t.description, 'Starbucks');
      assertEqual(t.amount, -4.75);
      assertEqual(t.category, 'Coffee / Bakery');
      assertEqual(t.fix, false);
      assertEqual(t.accountKey, 'Chase *7515');
      assert(t.id, 'has id');
    });

    test('fix defaults to false when empty', () => {
      const t = parseTransaction(['2025-01-01', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.fix, false);
    });

    test('fix is true for "true" string', () => {
      const t = parseTransaction(['2025-01-01', 'Test', '-1', '', 'true'], hdr, 'Chase *7515');
      assertEqual(t.fix, true);
    });

    test('strips dollar signs from amount', () => {
      const t = parseTransaction(['2025-01-01', 'Test', '$1,234.56', '', ''], hdr, 'Chase *7515');
      assertEqual(t.amount, 1234.56);
    });

    test('empty category stored as empty string', () => {
      const t = parseTransaction(['2025-01-01', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.category, '');
    });

    test('normalizes slash-delimited date to ISO format', () => {
      const t = parseTransaction(['2026/1/1', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.date, '2026-01-01');
    });

    test('zero-pads single-digit month and day in slash date', () => {
      const t = parseTransaction(['2026/3/5', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.date, '2026-03-05');
    });

    test('normalizes MM/DD/YYYY date to ISO format', () => {
      const t = parseTransaction(['04/05/2026', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.date, '2026-04-05');
    });

    test('normalizes M/D/YYYY date to ISO format', () => {
      const t = parseTransaction(['4/5/2026', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.date, '2026-04-05');
    });

    test('normalizes MM-DD-YYYY date to ISO format', () => {
      const t = parseTransaction(['04-05-2026', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.date, '2026-04-05');
    });

    test('normalizes YYYY/MM/DD date to ISO format', () => {
      const t = parseTransaction(['2026/04/05', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.date, '2026-04-05');
    });

    test('normalizes YYYY/M/D date to ISO format', () => {
      const t = parseTransaction(['2026/4/5', 'Test', '-1', '', ''], hdr, 'Chase *7515');
      assertEqual(t.date, '2026-04-05');
    });
  });

  // ── deduplicateTransactions ───────────────────────────────────────────────
  suite('deduplicateTransactions', () => {
    const base = [{ accountKey: 'Chase *7515', date: '2025-01-01', description: 'Foo', amount: -10, id: '1', category: '', fix: false }];

    test('adds new unique transaction', () => {
      const result = deduplicateTransactions(base, [{ accountKey: 'Chase *7515', date: '2025-01-02', description: 'Bar', amount: -5, id: '2', category: '', fix: false }]);
      assertEqual(result.length, 2);
    });

    test('does not add exact duplicate', () => {
      const dup = [{ accountKey: 'Chase *7515', date: '2025-01-01', description: 'Foo', amount: -10, id: '99', category: '', fix: false }];
      const result = deduplicateTransactions(base, dup);
      assertEqual(result.length, 1);
    });

    test('preserves original order', () => {
      const result = deduplicateTransactions(base, [{ accountKey: 'X *0000', date: '2025-01-03', description: 'Z', amount: -1, id: '3', category: '', fix: false }]);
      assertEqual(result[0].id, '1');
      assertEqual(result[1].accountKey, 'X *0000');
    });
  });

  // ── filterByMonth ─────────────────────────────────────────────────────────
  suite('filterByMonth', () => {
    const txs = [
      { date: '2025-01-01', category: 'Groceries', amount: -10 },
      { date: '2025-01-31', category: 'Groceries', amount: -20 },
      { date: '2025-02-01', category: 'Groceries', amount: -30 },
      { date: '2025-12-15', category: 'Groceries', amount: -5 },
    ];

    test('includes both boundary dates of a month', () => {
      const r = filterByMonth(txs, 2025, 1); // January
      assertEqual(r.length, 2);
    });

    test('excludes other months', () => {
      const r = filterByMonth(txs, 2025, 2); // February
      assertEqual(r.length, 1);
      assertEqual(r[0].amount, -30);
    });

    test('returns empty for month with no transactions', () => {
      const r = filterByMonth(txs, 2025, 6); // June
      assertEqual(r.length, 0);
    });
  });

  // ── aggregateByCategory ───────────────────────────────────────────────────
  suite('aggregateByCategory', () => {
    const txs = [
      { category: 'Groceries', amount: -50 },
      { category: 'Groceries', amount: -30 },
      { category: 'Restaurants', amount: -25 },
      { category: 'Gas / EV Charging', amount: -40 },
      { category: '', amount: -99 }, // uncategorized, should be excluded
    ];

    test('groups by parent and sub correctly', () => {
      const { groups } = aggregateByCategory(txs);
      assert(groups['Food'], 'Food group exists');
      assert(groups['Automotive'], 'Automotive group exists');
      assertEqual(groups['Food']['Groceries'].total, -80);
      assertEqual(groups['Food']['Groceries'].count, 2);
      assertEqual(groups['Food']['Restaurants'].total, -25);
    });

    test('computes grand total excluding uncategorized', () => {
      const { grandTotal } = aggregateByCategory(txs);
      assertEqual(grandTotal, -145);
    });

    test('omits subcategories with no transactions', () => {
      const { groups } = aggregateByCategory(txs);
      assert(!groups['Food']['Coffee / Bakery'], 'Coffee not present');
    });

    test('excludes Transfer parent from groups and grandTotal when excludeParents is passed', () => {
      const mixed = [
        { category: 'Groceries', amount: -50, id: '1', accountKey: 'A', date: '2026-01-01', description: 'x', fix: false },
        { category: 'Credit Card Payment', amount: -200, id: '2', accountKey: 'A', date: '2026-01-01', description: 'y', fix: false },
      ];
      const { groups, grandTotal } = aggregateByCategory(mixed, ['Transfer']);
      assertEqual(grandTotal, -50);
      assertEqual(groups['Transfer'], undefined);
    });

    test('without excludeParents, Transfer is included in grandTotal', () => {
      const mixed = [
        { category: 'Groceries', amount: -50, id: '1', accountKey: 'A', date: '2026-01-01', description: 'x', fix: false },
        { category: 'Credit Card Payment', amount: -200, id: '2', accountKey: 'A', date: '2026-01-01', description: 'y', fix: false },
      ];
      const { grandTotal } = aggregateByCategory(mixed);
      assertEqual(grandTotal, -250);
    });
  });

  // ── totalSpend ────────────────────────────────────────────────────────────
  suite('totalSpend', () => {
    test('sums all amounts', () => {
      const txs = [{ amount: -10 }, { amount: -20 }, { amount: 5 }];
      assertEqual(totalSpend(txs), -25);
    });

    test('returns 0 for empty list', () => {
      assertEqual(totalSpend([]), 0);
    });
  });

  // ── cycleCategoryByKey ────────────────────────────────────────────────────
  suite('cycleCategoryByKey', () => {
    test("'g' key cycles Gas → Groceries → Gifts → General Merchandise → wraps", () => {
      const r1 = cycleCategoryByKey('', 'g', ALL_SUBS);
      assertEqual(r1, 'Gas / EV Charging');
      const r2 = cycleCategoryByKey('Gas / EV Charging', 'g', ALL_SUBS);
      assertEqual(r2, 'Groceries');
      const r3 = cycleCategoryByKey('Groceries', 'g', ALL_SUBS);
      assertEqual(r3, 'Gifts');
      const r4 = cycleCategoryByKey('Gifts', 'g', ALL_SUBS);
      assertEqual(r4, 'General Merchandise');
      const r5 = cycleCategoryByKey('General Merchandise', 'g', ALL_SUBS);
      assertEqual(r5, 'Gas / EV Charging');
    });

    test("'r' key cycles to Restaurants", () => {
      const r = cycleCategoryByKey('', 'r', ALL_SUBS);
      assertEqual(r, 'Restaurants');
    });

    test("unknown key returns current value unchanged", () => {
      const r = cycleCategoryByKey('Groceries', 'z', ALL_SUBS);
      assertEqual(r, 'Groceries');
    });

    test("case-insensitive key match", () => {
      const lower = cycleCategoryByKey('', 'g', ALL_SUBS);
      const upper = cycleCategoryByKey('', 'G', ALL_SUBS);
      assertEqual(lower, upper);
    });
  });

  // ── validateExport ────────────────────────────────────────────────────────
  suite('validateExport', () => {
    test('passes when all rows have categories', () => {
      const rows = [{ category: 'Groceries' }, { category: 'Restaurants' }];
      const r = validateExport(rows);
      assert(r.valid);
      assertEqual(r.invalidRows.length, 0);
    });

    test('fails and returns indices of rows missing category', () => {
      const rows = [{ category: 'Groceries' }, { category: '' }, { category: 'Restaurants' }, { category: '' }];
      const r = validateExport(rows);
      assert(!r.valid);
      assertEqual(r.invalidRows, [1, 3]);
    });
  });

  // ── toCSV ─────────────────────────────────────────────────────────────────
  suite('toCSV', () => {
    test('outputs header row', () => {
      const csv = toCSV([]);
      assertEqual(csv, 'Date,Description,Amount,Category,Fix');
    });

    test('serializes boolean fix as true/false', () => {
      const csv = toCSV([{ date: '2025-01-01', description: 'Test', amount: -10, category: 'Groceries', fix: true }]);
      assert(csv.includes('true'), 'fix=true');
      const csv2 = toCSV([{ date: '2025-01-01', description: 'Test', amount: -10, category: 'Groceries', fix: false }]);
      assert(csv2.includes('false'), 'fix=false');
    });

    test('quotes fields with commas', () => {
      const csv = toCSV([{ date: '2025-01-01', description: 'Foo, Bar', amount: -10, category: 'Groceries', fix: false }]);
      assert(csv.includes('"Foo, Bar"'), 'quoted description');
    });

    test('full round-trip: all 5 columns present', () => {
      const row = { date: '2025-03-15', description: 'Starbucks', amount: -4.75, category: 'Coffee / Bakery', fix: false };
      const csv = toCSV([row]);
      const lines = csv.split('\n');
      assertEqual(lines.length, 2);
      assert(lines[1].includes('2025-03-15'));
      assert(lines[1].includes('Starbucks'));
      assert(lines[1].includes('-4.75'));
      assert(lines[1].includes('Coffee / Bakery'));
    });
  });

  // ── getMonthList ──────────────────────────────────────────────────────────
  suite('getMonthList', () => {
    const tx = (date) => ({ date, amount: 10, category: 'Groceries', description: 'x', id: date, accountKey: 'a', fix: false });

    test('given transactions in multiple months, returns them sorted chronologically', () => {
      const result = getMonthList([tx('2025-03-15'), tx('2025-01-10')]);
      assertEqual(result, [{ year: 2025, month: 1 }, { year: 2025, month: 3 }]);
    });

    test('given multiple transactions in the same month, aggregates into a single month entry', () => {
      const result = getMonthList([tx('2025-03-01'), tx('2025-03-28')]);
      assertEqual(result, [{ year: 2025, month: 3 }]);
    });

    test('given a transaction with no date, skips it', () => {
      const result = getMonthList([{ date: '', amount: 10, category: 'Groceries', description: 'x', id: '1', accountKey: 'a', fix: false }, tx('2025-05-10')]);
      assertEqual(result, [{ year: 2025, month: 5 }]);
    });

    test('given transactions spanning two years, sorts across year boundary correctly', () => {
      const result = getMonthList([tx('2025-01-10'), tx('2024-12-31')]);
      assertEqual(result, [{ year: 2024, month: 12 }, { year: 2025, month: 1 }]);
    });

    test('given no transactions, returns empty array', () => {
      assertEqual(getMonthList([]), []);
    });
  });

  // ── sortByDateDesc ────────────────────────────────────────────────────────
  suite('sortByDateDesc', () => {
    test('returns transactions sorted newest-first', () => {
      const txs = [
        { date: '2025-01-01', amount: -10 },
        { date: '2025-03-15', amount: -20 },
        { date: '2025-02-10', amount: -30 },
      ];
      const result = sortByDateDesc(txs);
      assertEqual(result[0].date, '2025-03-15');
      assertEqual(result[1].date, '2025-02-10');
      assertEqual(result[2].date, '2025-01-01');
    });

    test('does not mutate the original array', () => {
      const txs = [
        { date: '2025-01-01', amount: -10 },
        { date: '2025-03-15', amount: -20 },
      ];
      sortByDateDesc(txs);
      assertEqual(txs[0].date, '2025-01-01');
    });

    test('given a single transaction, returns it unchanged', () => {
      const txs = [{ date: '2025-06-01', amount: -5 }];
      const result = sortByDateDesc(txs);
      assertEqual(result.length, 1);
      assertEqual(result[0].date, '2025-06-01');
    });

    test('given an empty array, returns an empty array', () => {
      assertEqual(sortByDateDesc([]).length, 0);
    });
  });

  // ── filterBySearch ────────────────────────────────────────────────────────
  suite('filterBySearch', () => {
    const txs = [
      { description: 'Starbucks Coffee', category: 'Coffee / Bakery', amount: -5.50, id: '1', accountKey: 'A', date: '2026-01-01', fix: false },
      { description: 'Whole Foods', category: 'Groceries', amount: -87.32, id: '2', accountKey: 'A', date: '2026-01-02', fix: false },
      { description: 'Shell Gas', category: 'Gas / EV Charging', amount: -45.00, id: '3', accountKey: 'A', date: '2026-01-03', fix: false },
      { description: 'Disputed Charge', category: 'Misc', amount: -12.00, id: '4', accountKey: 'A', date: '2026-01-04', fix: true },
    ];

    test('given empty query, returns all transactions', () => {
      assertEqual(filterBySearch(txs, '').length, 4);
      assertEqual(filterBySearch(txs, '   ').length, 4);
    });

    test('given description match, returns matching transactions', () => {
      const r = filterBySearch(txs, 'starbucks');
      assertEqual(r.length, 1);
      assertEqual(r[0].description, 'Starbucks Coffee');
    });

    test('given category match, returns matching transactions', () => {
      const r = filterBySearch(txs, 'groceries');
      assertEqual(r.length, 1);
      assertEqual(r[0].category, 'Groceries');
    });

    test('given amount match, returns matching transactions', () => {
      const r = filterBySearch(txs, '87.32');
      assertEqual(r.length, 1);
      assertEqual(r[0].amount, -87.32);
    });

    test('given no match, returns empty array', () => {
      assertEqual(filterBySearch(txs, 'zzznomatch').length, 0);
    });

    test('match is case-insensitive', () => {
      assertEqual(filterBySearch(txs, 'SHELL').length, 1);
    });

    test('given "fix" query, returns only transactions with fix === true', () => {
      const r = filterBySearch(txs, 'fix');
      assertEqual(r.length, 1);
      assertEqual(r[0].id, '4');
    });

    test('given partial "fi" query, returns fix===true transaction (fi is prefix of fix)', () => {
      const r = filterBySearch(txs, 'fi');
      assertEqual(r.length, 1);
      assertEqual(r[0].id, '4');
    });
  });

  // ── exportAccountsJSON ───────────────────────────────────────────────────
  suite('exportAccountsJSON', () => {
    test('given an empty accounts array, returns "[]"', () => {
      assertEqual(exportAccountsJSON([]), '[]');
    });

    test('given accounts, returns minified JSON that round-trips correctly', () => {
      const accounts = [{ id: 'abc', name: 'Chase', last4: '1234', inputCsvFormat: ['date', 'description', 'amount'] }];
      const json = exportAccountsJSON(accounts);
      assertEqual(JSON.parse(json)[0].name, 'Chase');
      assertEqual(JSON.parse(json)[0].last4, '1234');
      assertEqual(json.includes('\n'), false);
    });
  });

  // ── importAccountsJSON ───────────────────────────────────────────────────
  suite('importAccountsJSON', () => {
    test('given valid JSON array of accounts, returns ok:true with accounts', () => {
      const input = JSON.stringify([{ id: 'x1', name: 'Chase', last4: '1234', inputCsvFormat: ['date', 'description', 'amount'] }]);
      const result = importAccountsJSON(input);
      assertEqual(result.ok, true);
      assertEqual(result.accounts[0].name, 'Chase');
    });

    test('given malformed JSON, returns ok:false with an error string', () => {
      const result = importAccountsJSON('not json {{');
      assertEqual(result.ok, false);
      assertEqual(typeof result.error, 'string');
    });

    test('given JSON that is not an array, returns ok:false', () => {
      const result = importAccountsJSON(JSON.stringify({ accounts: [] }));
      assertEqual(result.ok, false);
    });

    test('given an account missing name, returns ok:false', () => {
      const input = JSON.stringify([{ id: 'x1', last4: '1234', inputCsvFormat: [] }]);
      const result = importAccountsJSON(input);
      assertEqual(result.ok, false);
    });

    test('given an account missing last4, returns ok:false', () => {
      const input = JSON.stringify([{ id: 'x1', name: 'Chase', inputCsvFormat: [] }]);
      const result = importAccountsJSON(input);
      assertEqual(result.ok, false);
    });

    test('given an account missing inputCsvFormat, returns ok:false', () => {
      const input = JSON.stringify([{ id: 'x1', name: 'Chase', last4: '1234' }]);
      const result = importAccountsJSON(input);
      assertEqual(result.ok, false);
    });

    test('given inputCsvFormat that is not an array, returns ok:false', () => {
      const input = JSON.stringify([{ id: 'x1', name: 'Chase', last4: '1234', inputCsvFormat: 'bad' }]);
      const result = importAccountsJSON(input);
      assertEqual(result.ok, false);
    });

    test('given last4 that is fewer than 4 digits, returns ok:false', () => {
      const input = JSON.stringify([{ id: 'x1', name: 'Chase', last4: '12', inputCsvFormat: [] }]);
      const result = importAccountsJSON(input);
      assertEqual(result.ok, false);
    });

    test('given last4 that contains non-digit characters, returns ok:false', () => {
      const input = JSON.stringify([{ id: 'x1', name: 'Chase', last4: '12ab', inputCsvFormat: [] }]);
      const result = importAccountsJSON(input);
      assertEqual(result.ok, false);
    });
  });

  // ── isValidLast4 ─────────────────────────────────────────────────────────
  suite('isValidLast4', () => {
    test('given exactly 4 digits, returns true', () => {
      assertEqual(isValidLast4('1234'), true);
    });

    test('given fewer than 4 digits, returns false', () => {
      assertEqual(isValidLast4('123'), false);
    });

    test('given more than 4 digits, returns false', () => {
      assertEqual(isValidLast4('12345'), false);
    });

    test('given non-digit characters, returns false', () => {
      assertEqual(isValidLast4('12ab'), false);
    });

    test('given a number (not a string), returns false', () => {
      assertEqual(isValidLast4(1234), false);
    });
  });

  // ── sortByDateAsc ─────────────────────────────────────────────────────────
  suite('sortByDateAsc', () => {
    test('returns transactions sorted oldest-first', () => {
      const txs = [
        { date: '2025-03-15', amount: -20 },
        { date: '2025-01-01', amount: -10 },
        { date: '2025-02-10', amount: -30 },
      ];
      const result = sortByDateAsc(txs);
      assertEqual(result[0].date, '2025-01-01');
      assertEqual(result[1].date, '2025-02-10');
      assertEqual(result[2].date, '2025-03-15');
    });

    test('does not mutate the original array', () => {
      const txs = [
        { date: '2025-03-15', amount: -20 },
        { date: '2025-01-01', amount: -10 },
      ];
      sortByDateAsc(txs);
      assertEqual(txs[0].date, '2025-03-15');
    });

    test('given an empty array, returns an empty array', () => {
      assertEqual(sortByDateAsc([]).length, 0);
    });
  });

  // ── buildHeaderMap — debit_amount / credit_amount ────────────────────────
  suite('buildHeaderMap — debit_amount / credit_amount', () => {
    test('maps debit_amount and credit_amount to separate indices', () => {
      const m = buildHeaderMap(null, ['date', 'description', 'debit_amount', 'credit_amount']);
      assertEqual(m.debitAmount, 2);
      assertEqual(m.creditAmount, 3);
      assert(m.amount === undefined);
    });

    test('single amount column still works', () => {
      const m = buildHeaderMap(null, ['date', 'description', 'amount']);
      assertEqual(m.amount, 2);
      assert(m.debitAmount === undefined);
      assert(m.creditAmount === undefined);
    });

    test('returns error when debit_amount is present without credit_amount', () => {
      const m = buildHeaderMap(null, ['date', 'description', 'debit_amount']);
      assert(m.error);
      assert(m.error.includes('credit_amount'));
    });

    test('returns error when credit_amount is present without debit_amount', () => {
      const m = buildHeaderMap(null, ['date', 'description', 'credit_amount']);
      assert(m.error);
      assert(m.error.includes('debit_amount'));
    });

    test('returns error when amount and debit_amount are both specified', () => {
      const m = buildHeaderMap(null, ['date', 'description', 'amount', 'debit_amount', 'credit_amount']);
      assert(m.error);
      assert(m.error.includes('amount'));
    });

    test('returns error when date appears more than once', () => {
      const m = buildHeaderMap(null, ['date', 'date', 'description', 'amount']);
      assert(m.error);
      assert(m.error.includes('date'));
    });

    test('returns error when description appears more than once', () => {
      const m = buildHeaderMap(null, ['date', 'description', 'description', 'amount']);
      assert(m.error);
      assert(m.error.includes('description'));
    });

    test('returns error when amount appears more than once', () => {
      const m = buildHeaderMap(null, ['date', 'description', 'amount', 'amount']);
      assert(m.error);
      assert(m.error.includes('amount'));
    });
  });

  // ── validateImport — debit_amount / credit_amount ────────────────────────
  suite('validateImport — debit_amount / credit_amount', () => {
    const hdr = buildHeaderMap(null, ['date', 'description', 'debit_amount', 'credit_amount']);

    test('given debit column filled and credit blank, passes', () => {
      const r = validateImport([['2025-01-01', 'Coffee', '4.50', '']], hdr);
      assert(r.valid);
    });

    test('given credit column filled and debit blank, passes', () => {
      const r = validateImport([['2025-01-01', 'Refund', '', '10.00']], hdr);
      assert(r.valid);
    });

    test('given both columns blank, fails with row number', () => {
      const r = validateImport([['2025-01-01', 'Coffee', '', '']], hdr);
      assert(!r.valid);
      assert(r.errors[0].includes('Row 2'));
    });

    test('given both columns filled, fails with row number', () => {
      const r = validateImport([['2025-01-01', 'Coffee', '4.50', '4.50']], hdr);
      assert(!r.valid);
      assert(r.errors[0].includes('Row 2'));
    });
  });

  // ── parseTransaction — debit_amount / credit_amount ──────────────────────
  suite('parseTransaction — debit_amount / credit_amount', () => {
    const hdr = buildHeaderMap(null, ['date', 'description', 'debit_amount', 'credit_amount']);

    test('debit column value becomes negative', () => {
      const t = parseTransaction(['2025-01-01', 'Coffee', '4.50', ''], hdr, 'Chase *1234');
      assertEqual(t.amount, -4.5);
    });

    test('debit column with already-negative value still becomes negative', () => {
      const t = parseTransaction(['2025-01-01', 'Coffee', '-4.50', ''], hdr, 'Chase *1234');
      assertEqual(t.amount, -4.5);
    });

    test('credit column value becomes positive', () => {
      const t = parseTransaction(['2025-01-01', 'Refund', '', '10.00'], hdr, 'Chase *1234');
      assertEqual(t.amount, 10);
    });

    test('credit column with negative value still becomes positive', () => {
      const t = parseTransaction(['2025-01-01', 'Refund', '', '-10.00'], hdr, 'Chase *1234');
      assertEqual(t.amount, 10);
    });
  });

  // ── Render results ────────────────────────────────────────────────────────
  renderResults();
}

function renderResults() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  let totalPass = 0, totalFail = 0;

  results.forEach(suite => {
    const passCount = suite.tests.filter(t => t.pass).length;
    const failCount = suite.tests.length - passCount;
    totalPass += passCount;
    totalFail += failCount;

    const div = document.createElement('div');
    div.className = 'suite';

    const header = document.createElement('div');
    header.className = 'suite-header';
    header.innerHTML = `<span>${suite.name}</span><span class="badge">${passCount}/${suite.tests.length}</span>`;
    div.appendChild(header);

    suite.tests.forEach(t => {
      const row = document.createElement('div');
      row.className = `test ${t.pass ? 'pass-bg' : 'fail-bg'}`;
      row.innerHTML = `
        <span class="icon">${t.pass ? '✅' : '❌'}</span>
        <div class="test-name">
          ${t.name}
          ${t.err ? `<div class="test-err">${t.err}</div>` : ''}
          <div class="test-source">${escapeHtml(t.src)}</div>
        </div>
        <span class="test-toggle">▶</span>
      `;
      row.addEventListener('click', () => {
        const expanded = row.classList.toggle('expanded');
        row.querySelector('.test-toggle').textContent = expanded ? '▼' : '▶';
      });
      div.appendChild(row);
    });

    main.appendChild(div);
  });

  const summary = document.getElementById('summary');
  summary.innerHTML = `<span class="pass">✅ ${totalPass} passed</span>&nbsp;&nbsp;<span class="${totalFail ? 'fail' : 'pass'}">${totalFail ? `❌ ${totalFail} failed` : '✅ 0 failed'}</span>&nbsp;&nbsp;— ${totalPass + totalFail} total`;

  document.getElementById('header-status').textContent = totalFail ? `${totalFail} FAILING` : 'All tests pass';
  document.getElementById('header-status').style.color = totalFail ? '#f88' : '#8f8';
}
</script>
